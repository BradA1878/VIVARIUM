<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VIVARIUM</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&family=Newsreader:ital,opsz,wght@1,6..72,300;1,6..72,400;1,6..72,500&display=swap" rel="stylesheet" />
<style>
  :root{
    --void:#07090b; --void2:#0b0e12;
    --ink:#c3d0d6; --dim:#6a7a82; --faint:#3a464c;
    --cyan:#7fd4e8; --rust:#c8794f; --crit:#e8784f;
    --panel:rgba(12,16,20,0.74); --hair:rgba(127,212,232,0.12); --hair2:rgba(127,212,232,0.06);
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --serif:'Newsreader',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#000;overflow:hidden}
  body{font-family:var(--mono);color:var(--ink);-webkit-font-smoothing:antialiased;cursor:default}
  button{font-family:var(--mono);color:inherit;background:none;border:none;cursor:pointer}
  ::selection{background:rgba(127,212,232,0.25)}

  .app{position:fixed;inset:0;background:var(--void)}
  .stage{position:absolute;inset:0;width:100%;height:100%;display:block}
  .vignette{position:absolute;inset:0;pointer-events:none;
    background:radial-gradient(120% 90% at 50% 38%,transparent 45%,rgba(4,5,7,0.55) 100%);
    mix-blend-mode:multiply}
  .hud{position:absolute;inset:0;pointer-events:none;z-index:5}
  .hud > *{pointer-events:none}
  .panel,.ctl,.pal-btn,.alert,.term,.inspect{pointer-events:auto}

  /* ---------- top bar ---------- */
  .topbar{position:absolute;top:0;left:0;right:0;height:46px;display:flex;align-items:center;
    justify-content:space-between;padding:0 18px;
    background:linear-gradient(180deg,rgba(7,9,11,0.92),rgba(7,9,11,0.0));}
  .brand{display:flex;align-items:baseline;gap:10px;pointer-events:auto}
  .brand-mark{width:9px;height:9px;border-radius:50%;background:var(--cyan);align-self:center;
    box-shadow:0 0 10px var(--cyan);animation:pulse 3.4s ease-in-out infinite}
  .brand-name{font-family:var(--serif);font-style:italic;font-size:21px;letter-spacing:.04em;color:#e6eef1}
  .brand-sub{font-size:10.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim)}
  .controls{display:flex;align-items:center;gap:6px}
  .ctl{font-size:11px;letter-spacing:.08em;color:var(--dim);padding:6px 10px;border:1px solid transparent;border-radius:2px;transition:.15s}
  .ctl:hover{color:var(--ink);border-color:var(--hair)}
  .ctl.on{color:var(--cyan);border-color:rgba(127,212,232,0.4);background:rgba(127,212,232,0.07)}
  .ctl.spd{padding:6px 8px;min-width:30px}
  .ctl-sep{width:1px;height:18px;background:var(--hair);margin:0 4px}

  /* ---------- left rail ---------- */
  .left-col{position:absolute;top:56px;left:16px;width:300px}
  .panel{background:var(--panel);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);
    border:1px solid var(--hair);border-radius:3px}
  .rail{padding:14px 14px 12px}

  .clock{display:flex;gap:13px;align-items:center;padding-bottom:13px;border-bottom:1px solid var(--hair2)}
  .clock-dial{flex:0 0 auto}
  .clock-sol{fill:var(--dim);font-family:var(--mono);font-size:6px;letter-spacing:.2em}
  .clock-num{fill:var(--ink);font-family:var(--mono);font-size:13px;font-weight:500}
  .clock-info{flex:1}
  .clock-time{font-size:24px;font-weight:300;letter-spacing:.04em;color:#e6eef1;line-height:1}
  .clock-phase{font-size:10px;letter-spacing:.22em;color:var(--dim);margin-top:4px}
  .clock-wx{font-size:10.5px;letter-spacing:.06em;color:var(--dim);margin-top:7px}
  .clock-wx.storm{color:var(--rust)}

  .rail-res{display:flex;flex-direction:column;gap:13px;padding:14px 0 4px}
  .res{}
  .res-head{display:flex;justify-content:space-between;align-items:baseline}
  .res-label{font-size:10.5px;letter-spacing:.2em;display:flex;align-items:center;gap:6px;font-weight:500}
  .res-glyph{font-size:11px;opacity:.85}
  .res-flow{font-size:11px;font-variant-numeric:tabular-nums}
  .res-per{opacity:.5;font-size:9px}
  .res-nums{display:flex;align-items:baseline;gap:6px;margin:3px 0 5px}
  .res-amt{font-size:20px;font-weight:400;font-variant-numeric:tabular-nums;letter-spacing:.01em;line-height:1}
  .res-cap{font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums}
  .res-bar{position:relative;height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden}
  .res-fill{position:absolute;inset:0 auto 0 0;height:100%;border-radius:2px;transition:width .2s linear}
  .res-ticks span{position:absolute;top:0;bottom:0;width:1px;background:rgba(7,9,11,0.7)}
  .res-foot{margin-top:5px}
  .res-eta{font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
  .res-eta.pos{color:rgba(127,212,232,0.7)}
  .res-eta.dim{color:var(--faint)}
  .res-eta.crit{color:var(--crit)}
  .res-low .res-amt{color:var(--rust)!important}
  .res-crit{animation:critflash 1s steps(2,end) infinite}
  @keyframes critflash{50%{opacity:.62}}

  .crew{display:flex;gap:22px;padding-top:13px;border-top:1px solid var(--hair2)}
  .crew-row{display:flex;flex-direction:column;gap:3px}
  .crew-k{font-size:9.5px;letter-spacing:.2em;color:var(--dim)}
  .crew-v{font-size:16px;font-variant-numeric:tabular-nums}
  .crew-sub{font-size:10px;color:var(--dim);margin-left:4px}

  /* ---------- alerts ---------- */
  .right-col{position:absolute;top:56px;right:16px;width:268px;display:flex;flex-direction:column;gap:8px;align-items:flex-end}
  .alerts{display:flex;flex-direction:column;gap:8px;width:100%}
  .alert{display:flex;gap:10px;align-items:stretch;background:var(--panel);backdrop-filter:blur(9px);
    border:1px solid var(--hair);border-left:none;border-radius:3px;padding:9px 12px 9px 0;overflow:hidden}
  .alert-bar{width:3px;flex:0 0 3px;background:var(--rust)}
  .alert-txt{font-size:11px;letter-spacing:.1em;font-weight:500}
  .alert-sub{font-size:10px;color:var(--dim);margin-top:2px;letter-spacing:.04em}
  .alert.sev3{border-color:rgba(232,120,79,0.45)}
  .alert.sev3 .alert-bar{background:var(--crit);box-shadow:0 0 10px var(--crit);animation:pulse 1.1s ease-in-out infinite}
  .alert.sev3 .alert-txt{color:var(--crit)}
  .alert.sev2 .alert-txt{color:var(--rust)}
  .alert.sev2 .alert-bar{background:var(--rust)}

  /* ---------- VIVARIUM terminal ---------- */
  .bottom-left{position:absolute;left:16px;bottom:16px;width:380px}
  .term{background:var(--panel);backdrop-filter:blur(9px);border:1px solid var(--hair);border-radius:3px;display:flex;flex-direction:column;max-height:212px}
  .term-head{display:flex;align-items:center;gap:9px;padding:9px 12px;border-bottom:1px solid var(--hair2)}
  .term-eye{width:8px;height:8px;border-radius:50%;background:var(--cyan);box-shadow:0 0 9px var(--cyan);animation:pulse 2.6s ease-in-out infinite}
  .term-id{font-family:var(--serif);font-style:italic;font-size:14px;letter-spacing:.05em;color:#e6eef1;flex:1}
  .term-status{font-size:9px;letter-spacing:.24em;color:var(--dim)}
  .term-body{padding:10px 12px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:9px}
  .term-line{font-size:12.5px;line-height:1.42}
  .term-ts{font-family:var(--mono);font-size:10px;color:var(--faint);margin-right:7px;letter-spacing:.02em}
  .term-txt{font-family:var(--serif);font-style:italic;color:#cdd9dd;font-size:14px;letter-spacing:.005em}
  .term-caret{color:var(--cyan);font-style:normal;font-family:var(--mono);font-size:11px;animation:blink .9s steps(1) infinite}
  .term-body::-webkit-scrollbar{width:5px}
  .term-body::-webkit-scrollbar-thumb{background:var(--hair);border-radius:3px}

  /* ---------- inspector + palette ---------- */
  .bottom-center{position:absolute;left:50%;bottom:16px;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px}
  .inspect{display:flex;align-items:center;gap:10px;background:var(--panel);backdrop-filter:blur(9px);border:1px solid rgba(127,212,232,0.3);border-radius:3px;padding:6px 12px;font-size:11px;letter-spacing:.08em}
  .inspect.demo{border-color:rgba(232,120,79,0.4);color:var(--rust)}
  .ins-glyph{color:var(--cyan);font-weight:600}
  .ins-name{color:var(--ink)}
  .ins-hint{color:var(--dim);font-size:10px}

  .palette{background:var(--panel);backdrop-filter:blur(10px);border:1px solid var(--hair);border-radius:4px;padding:9px 11px}
  .pal-title{font-size:9px;letter-spacing:.28em;color:var(--dim);text-align:center;margin-bottom:8px}
  .pal-grid{display:flex;gap:5px}
  .pal-btn{width:62px;height:58px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
    border:1px solid var(--hair2);border-radius:3px;background:rgba(255,255,255,0.012);transition:.13s}
  .pal-btn:hover{border-color:var(--hair);background:rgba(127,212,232,0.05)}
  .pal-btn.sel{border-color:rgba(127,212,232,0.55);background:rgba(127,212,232,0.1);box-shadow:inset 0 0 12px rgba(127,212,232,0.12)}
  .pal-glyph{font-size:14px;color:var(--cyan);font-weight:500;letter-spacing:.02em}
  .pal-name{font-size:9px;color:var(--dim);letter-spacing:.03em;text-align:center;line-height:1.1}
  .pal-btn.sel .pal-name{color:var(--ink)}
  .pal-btn.demo .pal-glyph{color:var(--rust)}
  .pal-btn.demo.sel{border-color:rgba(232,120,79,0.55);background:rgba(232,120,79,0.1);box-shadow:none}

  .pal-tip{position:fixed;z-index:50;width:206px;background:rgba(9,12,15,0.97);border:1px solid var(--hair);
    border-radius:4px;padding:10px 11px;box-shadow:0 10px 30px rgba(0,0,0,0.6);pointer-events:none}
  .tip-name{font-size:12px;letter-spacing:.05em;color:#e6eef1;display:flex;justify-content:space-between;margin-bottom:5px}
  .tip-name span{color:var(--faint);font-size:10px}
  .tip-desc{font-family:var(--serif);font-style:italic;font-size:12.5px;line-height:1.4;color:var(--dim);margin-bottom:8px}
  .tip-stats{display:flex;flex-wrap:wrap;gap:4px 8px}
  .tip-stats span{font-size:10px;letter-spacing:.02em}
  .tip-prod{color:#9bd6a0}.tip-cons{color:var(--rust)}.tip-cap{color:var(--cyan)}
  .tip-staff{color:var(--dim)}.tip-press{color:var(--dim);border:1px solid var(--hair);border-radius:2px;padding:0 4px}

  /* ---------- boot ---------- */
  .boot{position:absolute;inset:0;z-index:30;background:#050608;display:flex;align-items:center;justify-content:center;
    animation:bootout .5s ease 2.1s forwards;cursor:pointer}
  .boot-inner{text-align:center}
  .boot-mark{font-family:var(--serif);font-style:italic;font-size:54px;letter-spacing:.08em;color:#e6eef1;
    text-shadow:0 0 24px rgba(127,212,232,0.4);margin-bottom:26px}
  .boot-log{display:inline-flex;flex-direction:column;gap:6px;text-align:left;min-width:280px}
  .boot-row{display:flex;justify-content:space-between;font-size:11px;letter-spacing:.06em;color:var(--dim);
    animation:fadein .3s ease}
  .boot-ok{color:var(--cyan)}
  .boot-hint{margin-top:24px;font-size:10px;letter-spacing:.24em;color:var(--faint);text-transform:uppercase}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes blink{50%{opacity:0}}
  @keyframes fadein{from{opacity:0}to{opacity:1}}
  @keyframes bootout{to{opacity:0;visibility:hidden}}

  @media (max-width:880px){
    .left-col{width:260px}.bottom-left{width:300px}
    .pal-btn{width:54px;height:52px}
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="engine.js"></script>
  <script src="render.js"></script>
  <script src="vivarium.js"></script>
  <script type="text/babel" src="hud.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
